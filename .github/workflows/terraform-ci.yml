name: Terraform CI

on:
  workflow_call:
    inputs:
      terraform_dir:
        description: 'Directory containing Terraform files (. for repo root)'
        type: string
        default: '.'
      docs_output_file:
        description: 'File checked by git diff after terraform-docs runs'
        type: string
        default: 'README.md'
      skip_terraform_validate:
        description: 'Skip terraform init and validate (use when backend requires live credentials)'
        type: boolean
        default: false
      trivy_config:
        description: 'Path to trivy config file relative to repo root (empty = auto-detect)'
        type: string
        default: ''
      trivyignore_path:
        description: 'Path to .trivyignore file relative to repo root (empty = auto-detect)'
        type: string
        default: ''

jobs:
  terraform-ci:
    name: Terraform Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: "~1.9"

      - name: Terraform Format Check
        working-directory: ${{ inputs.terraform_dir }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        if: ${{ !inputs.skip_terraform_validate }}
        working-directory: ${{ inputs.terraform_dir }}
        run: terraform init -backend=false

      - name: Terraform Validate
        if: ${{ !inputs.skip_terraform_validate }}
        working-directory: ${{ inputs.terraform_dir }}
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4.1.1

      - name: TFLint Init
        working-directory: ${{ inputs.terraform_dir }}
        run: tflint --init

      - name: TFLint
        working-directory: ${{ inputs.terraform_dir }}
        run: tflint

      - name: Trivy Config Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: ${{ inputs.terraform_dir }}
          exit-code: "1"
          severity: HIGH,CRITICAL
          trivy-config: ${{ inputs.trivy_config }}
          trivyignores: ${{ inputs.trivyignore_path }}

      - name: Install terraform-docs
        run: |
          curl -sSLo terraform-docs.tar.gz \
            https://github.com/terraform-docs/terraform-docs/releases/download/v0.20.0/terraform-docs-v0.20.0-linux-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz terraform-docs
          sudo mv terraform-docs /usr/local/bin/

      - name: terraform-docs check
        run: |
          terraform-docs ${{ inputs.terraform_dir }}
          git diff --exit-code ${{ inputs.docs_output_file }}
