name: Sync to VIP

on:
  workflow_call:
    inputs:
      target_repo:
        description: 'Target wpcomvip repo (e.g. wpcomvip/astronomy-com)'
        required: true
        type: string
      target_branch:
        description: 'Branch to push to on the target repo (e.g. stage, production)'
        required: true
        type: string
      php_version:
        description: 'PHP version (for optional pre-sync steps)'
        required: false
        type: string
        default: '8.2'
      node_version:
        description: 'Node version (for optional pre-sync steps)'
        required: false
        type: string
        default: '20'
      check_vip_divergence:
        description: 'Check whether VIP has commits not present in this branch before pushing. Set to false to opt out (not recommended).'
        required: false
        type: boolean
        default: true

jobs:
  sync:
    name: Sync to ${{ inputs.target_repo }}@${{ inputs.target_branch }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php_version }}
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Build deploy artifacts (composer + npm)
        id: build_artifacts
        env:
          COMPOSER_NO_INTERACTION: '1'
          COMPOSER_ALLOW_SUPERUSER: '1'
        run: |
          set -euo pipefail
          # Composer: install ONLY where composer.lock exists. A lockfile is
          # composer's contract that downstream installers can reproduce the
          # dependency tree deterministically. composer.json without a lock
          # often references dev-branches that no longer exist upstream
          # (real example: plugins/simple-tags requires dev-main of a package
          # that only ships dev-master), so we treat the shipped vendor/ as
          # canonical for lockless plugins and skip them. The exclusion of
          # /vendor/ paths prevents recursing into already-installed deps.
          # -maxdepth 3 keeps us at plugins/<name>/composer.lock, themes/<name>/composer.lock,
          # client-mu-plugins/<name>/composer.lock, etc. Anything deeper is a third-party
          # dep tree shipped by the plugin author (e.g. plugins/foo/includes/svg-sanitizer/
          # includes/phpunit/phpunit/composer.lock) — those should NOT be re-installed.
          mapfile -t composer_locks < <(
            find plugins themes mu-plugins client-mu-plugins private -maxdepth 3 -type f -name composer.lock 2>/dev/null \
              | grep -v '/vendor/' || true
          )
          for lf in "${composer_locks[@]}"; do
            [ -z "$lf" ] && continue
            dir=$(dirname "$lf")
            echo "::group::composer install in $dir"
            composer install --no-dev --no-scripts --optimize-autoloader --working-dir="$dir" || {
              echo "::error::composer install failed in $dir"
              exit 1
            }
            echo "::endgroup::"
          done
          # Report (don't fail) on composer.json without a lockfile so it's
          # visible in the run log.
          mapfile -t lockless < <(
            find plugins themes mu-plugins client-mu-plugins private -maxdepth 3 -type f -name composer.json 2>/dev/null \
              | grep -v '/vendor/' || true
          )
          for cf in "${lockless[@]}"; do
            [ -z "$cf" ] && continue
            dir=$(dirname "$cf")
            if [ ! -f "$dir/composer.lock" ]; then
              echo "::notice::skipping $dir — composer.json present but no composer.lock; relying on shipped vendor/"
            fi
          done
          # NPM: build ONLY where package-lock.json exists AND scripts.build is
          # defined. Same gating principle as composer: a lockfile means the
          # author intended downstream builds to reproduce.
          mapfile -t npm_locks < <(
            find plugins themes mu-plugins client-mu-plugins -maxdepth 3 -type f -name package-lock.json 2>/dev/null \
              | grep -v '/node_modules/' || true
          )
          for plf in "${npm_locks[@]}"; do
            [ -z "$plf" ] && continue
            dir=$(dirname "$plf")
            pf="$dir/package.json"
            [ -f "$pf" ] || continue
            if jq -e '.scripts.build // empty' "$pf" > /dev/null 2>&1; then
              echo "::group::npm build in $dir"
              ( cd "$dir" && npm ci --no-audit --no-fund && npm run build ) || {
                echo "::error::npm build failed in $dir"
                exit 1
              }
              echo "::endgroup::"
            fi
          done

      - name: Stage built artifacts into deploy commit
        id: stage_artifacts
        run: |
          set -euo pipefail
          # Force-add the artifact paths that source-side .gitignore may exclude.
          # If the find globs match nothing, git add -f tolerates it with -- end-of-options.
          mapfile -t artifact_paths < <(
            { find plugins themes mu-plugins client-mu-plugins private \
                \( -type d -name vendor -o -type d -name build -o -type d -name dist \) 2>/dev/null || true; } \
              | grep -v '/node_modules/' || true
          )
          if [ "${#artifact_paths[@]}" -gt 0 ] && [ -n "${artifact_paths[0]:-}" ]; then
            git add -f -- "${artifact_paths[@]}" || true
          fi
          if ! git diff --cached --quiet; then
            git commit -m "ci: build deploy artifacts (vendor, build)" \
              -m "Generated by vip-sync workflow. Source repo does not commit these."
            echo "committed=true" >> "$GITHUB_OUTPUT"
          else
            echo "no artifacts to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VIP_DEPLOY_TOKEN }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Add VIP remote
        run: git remote add vip "git@github.com:${{ inputs.target_repo }}.git"

      - name: Fetch VIP branch
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/deploy_key
        run: git fetch vip ${{ inputs.target_branch }}

      - name: Check for VIP divergence
        id: divergence_check
        if: inputs.check_vip_divergence
        run: |
          AHEAD=$(git log HEAD..vip/${{ inputs.target_branch }} --oneline)
          if [ -n "$AHEAD" ]; then
            echo "::error::VIP has commits not present in this branch:"
            echo "$AHEAD"
            echo "::error::Merge the reverse sync PR before pushing to VIP."
            echo "ahead_commits<<EOF" >> $GITHUB_OUTPUT
            echo "$AHEAD" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Push to VIP
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/deploy_key
        run: git push vip "HEAD:refs/heads/${{ inputs.target_branch }}" --force

      - name: Notify Slack — divergence failure
        if: failure() && steps.divergence_check.outcome == 'failure' && env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_VIP_PIPELINES_WEBHOOK }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          TARGET_BRANCH="${{ inputs.target_branch }}"
          TARGET_REPO="${{ inputs.target_repo }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          AHEAD="${{ steps.divergence_check.outputs.ahead_commits }}"
          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg branch "$TARGET_BRANCH" \
            --arg target "$TARGET_REPO" \
            --arg ahead "$AHEAD" \
            --arg run_url "$RUN_URL" \
            --arg run_num "${{ github.run_number }}" \
            '{
              text: "⚠️ \($repo) \($branch) sync blocked — VIP has commits Firecrown doesn'\''t",
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: "⚠️ *\($repo)* `\($branch)` sync blocked — VIP has commits Firecrown doesn'\''t:\n```\n\($ahead)\n```\nResolve: `gh workflow run vip-reverse-sync.yml --repo Firecrown-Media/\($repo) --ref main`" } },
                { type: "context", elements: [ { type: "mrkdwn", text: "Run #\($run_num) · <\($run_url)|view logs>" } ] }
              ]
            }')
          curl -fsS -X POST -H 'content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: Notify Slack — sync failure (other)
        if: failure() && steps.divergence_check.outcome != 'failure' && env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_VIP_PIPELINES_WEBHOOK }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          TARGET_BRANCH="${{ inputs.target_branch }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg branch "$TARGET_BRANCH" \
            --arg run_url "$RUN_URL" \
            --arg run_num "${{ github.run_number }}" \
            '{
              text: "❌ \($repo) \($branch) sync failed",
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: "❌ *\($repo)* `\($branch)` sync failed" } },
                { type: "context", elements: [ { type: "mrkdwn", text: "Run #\($run_num) · <\($run_url)|view logs>" } ] }
              ]
            }')
          curl -fsS -X POST -H 'content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: Notify Slack — sync success
        if: success() && env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_VIP_PIPELINES_WEBHOOK }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          TARGET_BRANCH="${{ inputs.target_branch }}"
          TARGET_REPO="${{ inputs.target_repo }}"
          SHA_SHORT=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg target "$TARGET_REPO" \
            --arg branch "$TARGET_BRANCH" \
            --arg sha "$SHA_SHORT" \
            --arg msg "$COMMIT_MSG" \
            --arg run_url "$RUN_URL" \
            --arg run_num "${{ github.run_number }}" \
            '{
              text: "✅ \($repo) → \($target):\($branch)",
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: "✅ *\($repo)* → `\($target):\($branch)`\n`\($sha)` \($msg)" } },
                { type: "context", elements: [ { type: "mrkdwn", text: "Run #\($run_num) · <\($run_url)|view logs>" } ] }
              ]
            }')
          curl -fsS -X POST -H 'content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
