name: Sync to VIP

on:
  workflow_call:
    inputs:
      target_repo:
        description: 'Target wpcomvip repo (e.g. wpcomvip/astronomy-com)'
        required: true
        type: string
      target_branch:
        description: 'Branch to push to on the target repo (e.g. stage, production)'
        required: true
        type: string
      php_version:
        description: 'PHP version (for optional pre-sync steps)'
        required: false
        type: string
        default: '8.2'
      node_version:
        description: 'Node version (for optional pre-sync steps)'
        required: false
        type: string
        default: '20'
    secrets:
      deploy_token:
        description: 'SSH private key with write access to the target wpcomvip repo'
        required: true

jobs:
  sync:
    name: Sync to ${{ inputs.target_repo }}@${{ inputs.target_branch }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup SSH deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.deploy_token }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Add VIP remote
        run: git remote add vip "git@github.com:${{ inputs.target_repo }}.git"

      - name: Push to VIP
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/deploy_key
        run: git push vip "HEAD:refs/heads/${{ inputs.target_branch }}" --force
