name: Infracost

on:
  workflow_call:
    inputs:
      terraform_dir:
        description: 'Directory containing Terraform files'
        type: string
        default: 'terraform'
      tfvars_file:
        description: '.tfvars file path relative to repo root (e.g. terraform/prod.tfvars)'
        type: string
        default: 'terraform/prod.tfvars'
    secrets:
      INFRACOST_API_KEY:
        required: true

jobs:
  infracost:
    name: Infracost Cost Estimate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Run Infracost breakdown
        run: |
          infracost breakdown \
            --path ${{ inputs.terraform_dir }} \
            --terraform-var-file ${{ inputs.tfvars_file }} \
            --format json \
            --out-file /tmp/infracost.json

      - name: Post Infracost comment
        run: |
          infracost comment github \
            --path /tmp/infracost.json \
            --repo $GITHUB_REPOSITORY \
            --pull-request ${{ github.event.pull_request.number }} \
            --github-token ${{ github.token }} \
            --behavior update

